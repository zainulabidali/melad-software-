<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institute Event Portal — Authentication</title>
    <meta name="description"
        content="Access the Cultural & Arts Festival Management System. Secure portal for Admins and Teachers.">
    <!-- Premium Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0720;
            --accent-primary: #6366f1;
            --accent-secondary: #7c3aed;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
            --card-glass: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.12);
            --radius-lg: 24px;
            --radius-md: 12px;
            --shadow-premium: 0 30px 70px rgba(0, 0, 0, 0.45), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            --font-headings: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Beautiful Animated Background Glows ── */
        .bg-glow-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.45;
            transition: all 1s ease-in-out;
        }

        .bg-glow-1 {
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, var(--accent-primary) 0%, rgba(99, 102, 241, 0) 70%);
            top: -10%;
            left: -5%;
            animation: floatGlow1 22s infinite alternate ease-in-out;
        }

        .bg-glow-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-secondary) 0%, rgba(124, 58, 237, 0) 70%);
            bottom: -15%;
            right: -5%;
            animation: floatGlow2 26s infinite alternate ease-in-out;
        }

        .bg-glow-3 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #ec4899 0%, rgba(236, 72, 153, 0) 70%);
            top: 40%;
            left: 60%;
            animation: floatGlow3 20s infinite alternate ease-in-out;
        }

        .bg-vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(5, 2, 18, 0.85) 100%);
            z-index: 2;
            pointer-events: none;
        }

        @keyframes floatGlow1 {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(140px, 90px) scale(1.15);
            }
        }

        @keyframes floatGlow2 {
            0% {
                transform: translate(0, 0) scale(1.1);
            }

            100% {
                transform: translate(-120px, -140px) scale(0.9);
            }
        }

        @keyframes floatGlow3 {
            0% {
                transform: translate(0, 0) scale(0.95);
            }

            100% {
                transform: translate(90px, -80px) scale(1.12);
            }
        }

        /* ── Centered Auth Container ── */
        .auth-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 490px;
            padding: 10px 0;
            animation: fadeInPage 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* ── White Translucent Glass Card ── */
        .auth-card {
            background: var(--card-glass);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow-premium);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 38px 85px rgba(0, 0, 0, 0.55), inset 0 1px 1px rgba(255, 255, 255, 0.22);
        }

        /* ── Brand / Header ── */
        .brand-container {
            text-align: center;
            margin-bottom: 2.25rem;
        }

        .logo-badge {
            width: 72px;
            height: 72px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .logo-icon {
            font-size: 2.25rem;
            z-index: 2;
            animation: logoFloat 3.5s ease-in-out infinite;
        }

        .logo-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--accent-primary);
            border-radius: 50%;
            filter: blur(15px);
            opacity: 0.55;
            z-index: 1;
        }

        .brand-container h2 {
            font-family: var(--font-headings);
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
            margin-bottom: 0.35rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .brand-container p {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ── Authentic Custom Tabs ── */
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 5px;
            margin-bottom: 2.25rem;
            gap: 6px;
        }

        .auth-tab {
            flex: 1;
            padding: 0.8rem 1rem;
            border: none;
            background: transparent;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Active State: Premium Purple Gradient, White Bold Text, Soft Glow Shadow */
        .auth-tab.active {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: #ffffff !important;
            box-shadow: 0 6px 18px rgba(99, 102, 241, 0.4);
        }

        /* Inactive State: Light Glass Background, Dark Text */
        .auth-tab:not(.active) {
            background: rgba(255, 255, 255, 0.72);
            color: #110e29;
        }

        .auth-tab:not(.active):hover {
            background: rgba(255, 255, 255, 0.9);
            color: #0c0820;
            transform: translateY(-1px);
        }

        /* ── Input styling ── */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0.5rem;
            letter-spacing: 0.01em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.45);
            pointer-events: none;
            transition: color 0.3s;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            color: #ffffff;
            outline: none;
            font-family: var(--font-body);
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .form-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25);
        }

        .form-input:focus+.input-icon {
            color: #818cf8;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* ── Register Note Box ── */
        .register-note {
            background: rgba(99, 102, 241, 0.14);
            border: 1px solid rgba(99, 102, 241, 0.28);
            border-radius: var(--radius-md);
            padding: 1rem 1.15rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.75rem;
            font-size: 0.8125rem;
            color: #cbd5e1;
            line-height: 1.55;
            animation: slideDown 0.4s ease;
        }

        .note-icon {
            font-size: 1.25rem;
            line-height: 1;
        }

        .register-note strong {
            display: block;
            color: #a5b4fc;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        /* ── Alerts ── */
        .alert {
            padding: 0.875rem 1.15rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            line-height: 1.45;
            font-weight: 500;
            animation: slideDown 0.35s ease;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.16);
            border: 1px solid rgba(239, 68, 68, 0.32);
            color: #fca5a5;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.16);
            border: 1px solid rgba(59, 130, 246, 0.32);
            color: #93c5fd;
        }

        /* ── Custom Styled Buttons ── */
        .btn-auth {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: #ffffff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 0.75rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
            font-family: var(--font-body);
        }

        .btn-auth:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.55), 0 0 35px rgba(124, 58, 237, 0.35);
        }

        .btn-auth:active:not(:disabled) {
            transform: translateY(-0.5px);
        }

        .btn-auth:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        /* ── Spinners ── */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }

        /* ── Footer ── */
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.02em;
        }

        /* ── Keyframe Animations ── */
        @keyframes fadeInPage {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes logoFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Responsive Styling ── */
        @media (max-width: 640px) {
            body {
                padding: 1rem 0.75rem;
            }

            .auth-card {
                padding: 2.25rem 1.5rem;
                border-radius: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .brand-container h2 {
                font-size: 1.5rem;
            }
        }

        /* Premium custom inline validation styles */
        .form-input.is-invalid {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15) !important;
        }

        .form-input.is-valid {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
        }

        .error-message {
            color: #fca5a5;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.3s ease;
            height: 0;
            overflow: hidden;
        }

        .error-message.visible {
            opacity: 1;
            transform: translateY(0);
            height: auto;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <!-- Background Elements -->
    <div class="bg-glow-container">
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
        <div class="bg-glow bg-glow-3"></div>
        <div class="bg-vignette"></div>
    </div>

    <!-- Centered Login Card -->
    <main class="auth-wrapper">
        <div class="auth-card">
            <!-- Brand Logo Header -->
            <div class="brand-container">
                <div class="logo-badge">
                    <span class="logo-icon">🏫</span>
                    <div class="logo-glow"></div>
                </div>
                <h2>Institute Event Portal</h2>
                <p>Cultural & Arts Festival Management System</p>
            </div>

            <!-- Integrated Glass Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin">Admin Login</button>
                <button class="auth-tab" id="tabRegister">Teacher Registration</button>
            </div>

            <!-- Alert messages wrapper -->
            <div id="alertMessage" class="alert hidden"></div>

            <!-- Forms wrapper -->
            <div class="forms-container">
                <!-- ADMIN LOGIN FORM -->
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="loginEmail">Email Address</label>
                        <div class="input-wrapper">
                            <span class="input-icon">✉️</span>
                            <input type="email" id="loginEmail" class="form-input" required
                                placeholder="your@email.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="loginPassword">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔑</span>
                            <input type="password" id="loginPassword" class="form-input" required placeholder="••••••••"
                                minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn-auth" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <span class="spinner hidden" id="loginSpinner"></span>
                    </button>
                </form>

                <!-- TEACHER REGISTRATION FORM -->
                <form id="registerForm" class="hidden" novalidate>
                    <div class="register-note">
                        <span class="note-icon">👋</span>
                        <div class="note-content">
                            <strong>Teacher / Ustad Registration</strong>
                            After submitting, your account will be reviewed by the Super Admin before activation.
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="regFullName">Full Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="regFullName" class="form-input" required
                                placeholder="e.g. Zainul Abid JK">
                        </div>
                        <div class="error-message" id="err-regFullName"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="regEmail">Email Address</label>
                        <div class="input-wrapper">
                            <span class="input-icon">✉️</span>
                            <input type="email" id="regEmail" class="form-input" required placeholder="your@email.com">
                        </div>
                        <div class="error-message" id="err-regEmail"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="regPhone">Phone Number</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📞</span>
                            <input type="tel" id="regPhone" class="form-input" required
                                placeholder="e.g. 9207846064">
                        </div>
                        <div class="error-message" id="err-regPhone"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="regPlace">Place / Location</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📍</span>
                            <input type="text" id="regPlace" class="form-input" required
                                placeholder="e.g. Kasaragod, Kerala">
                        </div>
                        <div class="error-message" id="err-regPlace"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="regPassword">Password</label>
                            <div class="input-wrapper">
                                <span class="input-icon">🔑</span>
                                <input type="password" id="regPassword" class="form-input" required
                                    placeholder="Min 6 characters">
                            </div>
                            <div class="error-message" id="err-regPassword"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regConfirmPassword">Confirm Password</label>
                            <div class="input-wrapper">
                                <span class="input-icon">🔒</span>
                                <input type="password" id="regConfirmPassword" class="form-input" required
                                    placeholder="Re-enter password">
                            </div>
                            <div class="error-message" id="err-regConfirmPassword"></div>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth" id="registerBtn">
                        <span class="btn-text">Register</span>
                        <span class="spinner hidden" id="registerSpinner"></span>
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <div class="auth-footer">
               Institute Event Portal &copy; 2026 &bull; Created by Zainul Abid JK 
            </div>
        </div>
    </main>

    <!-- Load Firebase and Auth Scripts -->
    <script type="module" src="./js/firebase.js"></script>
    <script type="module" src="./js/auth.js"></script>
    <script>
        // Support URL Hash focus mapping (e.g. #register for opening Teacher Registration tab automatically)
        window.addEventListener('DOMContentLoaded', () => {
            if (window.location.hash === '#register') {
                const tabReg = document.getElementById('tabRegister');
                if (tabReg) {
                    tabReg.click();
                }
            }
        });
    </script>
</body>

</html>
