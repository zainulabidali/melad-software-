<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Main Portal — Institute Event Portal</title>
    <meta http-equiv="refresh" content="0; url=../index.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1b4b;
            --text: #ffffff;
            --accent: #6366f1;
        }
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 60%, #4338ca 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 1rem;
            text-align: center;
            overflow: hidden;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
            opacity: 0.9;
        }
        p {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }
        a {
            color: var(--accent);
            text-decoration: underline;
            font-weight: 500;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Check hash to preserve links (e.g. #register for signup tab focus on root page)
        const hash = window.location.hash || '';
        window.location.replace('../index.html' + hash);
    </script>
</head>
<body>
    <div class="spinner"></div>
    <h1>Redirecting to Main Portal</h1>
    <p>Please wait a moment. If you are not redirected automatically, <a href="../index.html">click here</a>.</p>
</body>
</html>
