<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Institute Event Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4338ca 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-brand .logo-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .auth-brand h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.25rem;
        }

        .auth-brand p {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.875rem;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .auth-tabs {
            display: flex;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 1.75rem;
            gap: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 0.625rem 1rem;
            border: none;
            background: transparent;
            border-radius: 9px;
            font-weight: 600;
            font-size: 0.875rem;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: white;
            color: #4338ca;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.4rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.875rem;
            color: #1e293b;
            background: #f8fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #4338ca;
            box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1);
            background: white;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .alert.hidden {
            display: none;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-info {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }

        .btn-auth {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #4338ca, #6366f1);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
            font-family: 'Inter', sans-serif;
        }

        .btn-auth:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(67, 56, 202, 0.35);
        }

        .btn-auth:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
            color: #cbd5e1;
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .register-note {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border: 1px solid #bae6fd;
            border-radius: 10px;
            padding: 0.875rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.8125rem;
            color: #0369a1;
            line-height: 1.5;
        }

        .register-note strong {
            display: block;
            margin-bottom: 0.25rem;
            color: #0c4a6e;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-brand">
            <span class="logo-icon">🏫</span>
            <h1>Institute Event Portal</h1>
            <p>Cultural & Arts Festival Management System</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin">Sign In</button>
                <button class="auth-tab" id="tabRegister">Teacher Registration</button>
            </div>

            <div id="alertMessage" class="alert hidden"></div>

            <!-- LOGIN FORM -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" class="form-input" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-input" required placeholder="••••••••"
                        minlength="6">
                </div>
                <button type="submit" class="btn-auth" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner hidden" id="loginSpinner"></span>
                </button>
            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" class="hidden">
                <div class="register-note">
                    <strong>👋 Teacher / Ustad Registration</strong>
                    After submitting, your account will be reviewed by the Super Admin before activation.
                </div>
                <div class="form-group">
                    <label class="form-label" for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" class="form-input" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="regPassword">Password</label>
                    <input type="password" id="regPassword" class="form-input" required placeholder="Min 6 characters"
                        minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" class="form-input" required
                        placeholder="Re-enter password" minlength="6">
                </div>
                <button type="submit" class="btn-auth" id="registerBtn">
                    <span class="btn-text">Submit Registration</span>
                    <span class="spinner hidden" id="registerSpinner"></span>
                </button>
            </form>

            <div class="auth-footer">
                Institute Event Portal &copy; 2025 &mdash; Powered by Firebase
            </div>
        </div>
    </div>

    <script type="module" src="../js/firebase.js"></script>
    <script type="module" src="../js/auth.js"></script>
</body>

</html>
