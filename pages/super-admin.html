<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Dashboard — Institute Event Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        /* ── Frosted Light Glassmorphism Cards ── */
        .institutes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.75rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.72) !important;
            backdrop-filter: blur(20px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.45) !important;
            border-radius: 20px !important;
            padding: 1.75rem !important;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04), inset 0 1px 1px rgba(255, 255, 255, 0.8) !important;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
            display: flex;
            flex-direction: column;
            color: var(--text-dark);
            height: 100%;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.9) !important;
            border-color: rgba(67, 56, 202, 0.3) !important;
        }

        .glass-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            padding-bottom: 1rem;
            margin-bottom: 1.25rem;
        }

        .card-type-tag {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--primary-color);
            margin-bottom: 0.25rem;
            display: block;
        }

        .glass-card .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
            line-height: 1.2;
        }

        .glass-card .card-body {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            font-size: 0.875rem;
            flex-grow: 1;
        }

        .card-info-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-info-icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
            opacity: 0.8;
            flex-shrink: 0;
        }

        .card-info-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .card-info-label {
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.2;
        }

        .card-info-val {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.875rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .glass-card .card-actions {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        /* ── Premium Responsive Table for Pending ── */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            background: #ffffff;
            margin-top: 1rem;
        }

        .premium-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
            text-align: left;
            min-width: 800px;
        }

        .premium-table th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 700;
            padding: 1rem 1.25rem;
            border-bottom: 2px solid var(--border-color);
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.05em;
        }

        .premium-table td {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            color: #334155;
            vertical-align: middle;
        }

        .premium-table tr:last-child td {
            border-bottom: none;
        }

        .premium-table tr:hover {
            background-color: #f8fafc;
        }

        .table-teacher-name {
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            color: #4338ca;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.8rem;
        }

        /* ── Modern Blur overlay & Modal overrides ── */
        .modal-overlay {
            backdrop-filter: blur(8px) !important;
            background-color: rgba(15, 23, 42, 0.4) !important;
            transition: all 0.3s ease;
        }

        .modal {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(25px) saturate(190%) !important;
            -webkit-backdrop-filter: blur(25px) saturate(190%) !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            border-radius: 24px !important;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.12) !important;
            animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>

<body class="dashboard-body hidden" style="display: none;">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span style="font-size:1.5rem;">🏫</span>
            <h2>Super Admin</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" id="navInstitutes" data-section="institutes">
                <span class="icon">🏢</span> Institutes
            </a>
            <a href="#" class="nav-item" id="navPending" data-section="pending">
                <span class="icon">⏳</span> Pending Registrations
                <span class="pending-badge hidden" id="pendingBadge">0</span>
            </a>

            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:1rem 0;">
            <a href="#" class="nav-item" id="logoutBtn">
                <span class="icon">🚪</span> Logout
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="topbar">
            <h1 class="page-title" id="pageTitle">Manage Institutes</h1>
            <div class="topbar-actions" id="topbarActions">
                <button class="btn btn-primary" id="openAddModalBtn">+ Add Institute</button>
            </div>
        </header>

        <!-- INSTITUTES SECTION -->
        <section class="content-area" id="sectionInstitutes">
            <div id="institutesLoader" class="loader-container hidden">
                <div class="spinner"></div>
            </div>
            <div class="institutes-grid" id="institutesGrid"></div>
        </section>

        <!-- PENDING REGISTRATIONS SECTION -->
        <section class="content-area hidden" id="sectionPending">
            <div id="pendingLoader" class="loader-container hidden">
                <div class="spinner"></div>
            </div>
            <div class="pending-info-box">
                <span>👋</span>
                <p>These teachers have registered and are awaiting your approval. Approve to assign them to an
                    institute, or reject their request.</p>
            </div>
            <div id="pendingGrid" class="pending-grid"></div>
        </section>


    </main>

    <!-- Add Institute Modal -->
    <div class="modal-overlay hidden" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Create New Institute</h3>
                <button class="close-modal" id="closeAddModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addInstituteForm">
                    <div class="form-group">
                        <label class="form-label" for="name">Institute Name</label>
                        <input type="text" id="name" class="form-input" required placeholder="e.g. Lahore Arts Academy">
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label" for="type">Type</label>
                        <input type="text" id="type" class="form-input" required
                            placeholder="e.g. School, College, Academy">
                    </div>
                    <div class="form-group mb-6">
                        <label class="form-label" for="expiryDate">Expiry Date (Optional)</label>
                        <input type="date" id="expiryDate" class="form-input">
                    </div>
                    <div id="modalAlert" class="alert hidden"></div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" id="cancelAddModalBtn">Cancel</button>
                        <button type="button" class="btn btn-primary" id="saveInstituteBtn" onclick="submitForm()">
                            <span class="btn-text">Create Institute</span>
                            <span class="btn-spinner hidden"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Institute Modal -->
    <div class="modal-overlay hidden" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Edit Institute</h3>
                <button class="close-modal" id="closeEditModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editInstituteForm">
                    <input type="hidden" id="editInstId">
                    <div class="form-group">
                        <label class="form-label" for="editName">Institute Name</label>
                        <input type="text" id="editName" class="form-input" required>
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label" for="editType">Type</label>
                        <input type="text" id="editType" class="form-input" required>
                    </div>
                    <div class="form-group mb-6">
                        <label class="form-label" for="editExpiryDate">Expiry Date (Optional)</label>
                        <input type="date" id="editExpiryDate" class="form-input">
                    </div>
                    <div id="editModalAlert" class="alert hidden"></div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" id="cancelEditModalBtn">Cancel</button>
                        <button type="button" class="btn btn-primary" id="updateInstituteBtn">
                            <span class="btn-text">Save Changes</span>
                            <span class="btn-spinner hidden"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Approve Modal -->
    <div class="modal-overlay hidden" id="approveModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Approve & Create Institute</h3>
                <button class="close-modal" id="closeApproveModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group mb-4">
                    <label class="form-label">Teacher Email</label>
                    <div style="padding:0.75rem 1rem; background:rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); border-radius:10px; font-size:0.875rem; font-weight: 600; color:#334155;"
                        id="approveEmail">—</div>
                </div>
                <input type="hidden" id="approveUid">

                <div class="form-group mb-4">
                    <label class="form-label" for="approveInstName">Institute Name</label>
                    <input type="text" id="approveInstName" class="form-input" required placeholder="e.g. Darul Huda Academy" style="background:#ffffff;">
                </div>

                <div class="form-group mb-4">
                    <label class="form-label" for="approveInstType">Institute Type</label>
                    <select id="approveInstType" class="form-input" required style="background:#ffffff;">
                        <option value="">— Select Type —</option>
                        <option value="Madrasa">Madrasa</option>
                        <option value="School">School</option>
                        <option value="College">College</option>
                        <option value="Arabic College">Arabic College</option>
                        <option value="Islamic Center">Islamic Center</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label" for="approvePlanDuration">Plan Duration</label>
                    <select id="approvePlanDuration" class="form-input" required style="background:#ffffff;">
                        <option value="30">30 Days</option>
                        <option value="90">90 Days</option>
                        <option value="180">180 Days</option>
                        <option value="365" selected>365 Days</option>
                    </select>
                </div>

                <div style="margin-top: 1rem; padding: 0.85rem 1rem; background: rgba(67, 56, 202, 0.08); border: 1px solid rgba(67, 56, 202, 0.15); border-radius: 12px; font-size: 0.825rem; font-weight: 700; color: #4338ca; display: flex; align-items: center; gap: 8px;" id="approveExpiryPreview">
                    📅 Expires on: —
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelApproveBtn">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmApproveBtn" style="background: linear-gradient(135deg, #4338ca, #6366f1); border:none; box-shadow: 0 4px 12px rgba(67,56,202,0.25);">
                        <span class="btn-text">Approve & Create Institute</span>
                        <span class="btn-spinner hidden"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script type="module" src="../js/firebase.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/super-admin.js"></script>
</body>

</html>
