<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasa Competition Public Results Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Cinzel:wght@600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #064e3b; /* Deep emerald */
            --primary-light: #0f766e;
            --accent: #b45309; /* Deep gold */
            --accent-light: #f59e0b; /* Bright gold */
            --bg: #f4f6f5;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --text-muted: #475569;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(6, 78, 59, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(180, 83, 9, 0.03) 0%, transparent 40%);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .public-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            box-sizing: border-box;
        }

        /* ─────────────────────────────────────────────────────────────
           Hero Header Section
           ───────────────────────────────────────────────────────────── */
        .public-header {
            text-align: center;
            background: linear-gradient(135deg, #022c22 0%, #064e3b 100%);
            padding: 3.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px -15px rgba(2, 44, 34, 0.3);
            color: white;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Islamic Dome Pattern Overlay */
        .public-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.25;
            pointer-events: none;
        }

        /* Animated Glowing Orbs */
        .header-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            top: -50px;
            right: -50px;
            animation: floatGlow 8s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-30px, 30px) scale(1.15); }
        }

        .header-logo {
            font-size: 3rem;
            line-height: 1;
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            animation: logoPulse 4s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(3deg); }
        }

        .inst-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.25rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
            color: #fef08a; /* Soft gold text color */
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .event-banner-title {
            font-family: 'Cinzel', serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 1rem 0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .header-subtitle {
            font-size: 0.95rem;
            color: #ccfbf1;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 500;
            line-height: 1.6;
        }

        /* ─────────────────────────────────────────────────────────────
           Glassmorphic Filter Toolbar
           ───────────────────────────────────────────────────────────── */
        .filter-bar {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1.25rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            gap: 0.85rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-wrapper {
            flex: 1.8;
            min-width: 240px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
            background: #ffffff;
            color: var(--text-main);
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: #94a3b8;
            pointer-events: none;
        }

        .filter-select {
            flex: 1;
            min-width: 160px;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
            background: #ffffff;
            color: var(--text-main);
            cursor: pointer;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary-light);
        }

        .btn-search {
            padding: 0.75rem 1.75rem;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-search:hover {
            background: var(--primary-light);
        }

        .btn-search:active {
            transform: scale(0.97);
        }

        /* ─────────────────────────────────────────────────────────────
           Poster Content Layout Grid
                   /* ─────────────────────────────────────────────────────────────
            REFERENCE-DESIGNED 4:5 RESULT POSTER LAYOUT
            ───────────────────────────────────────────────────────────── */
        .result-poster{
            width:100%;
            max-width:450px;
            aspect-ratio:4/5;
            position:relative;
            overflow:hidden;
            margin:auto;
            border-radius:30px;
            flex-shrink:0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.4s ease-in-out; /* Smooth background fade animation */
            box-shadow: 0 15px 40px rgba(0, 0, 0, .12);
            box-sizing: border-box;
        }

        /* Ambient subtle contrast overlay */
        .result-poster::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.3) 100%);
            pointer-events: none;
            border-radius: 30px;
            z-index: 1;
        }

        .result-poster > * {
            position: relative;
            z-index: 2;
        }

        .result-number{
            display:block;
            margin-top:10px;
            margin-bottom:25px;
            font-size:18px;
            font-weight:700;
            letter-spacing:3px;
            opacity:.7;
            z-index:20;
            position:relative;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .category {
            font-size: 20px;
            letter-spacing: 2px;
            color: #fbbf24; /* Warm premium gold to stand out on dark bgs */
            text-transform: uppercase;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
            font-weight: 600;
        }

        .program {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            font-family: 'Cinzel', serif;
        }

        /* ─────────────────────────────────────────────────────────────
           GLASSMORPHIC WINNER STANDINGS CARDS
           ───────────────────────────────────────────────────────────── */
        .winner-card{
            display:flex;
            align-items:center;
            gap:18px;
            padding:20px;
            margin-bottom:18px;
            border-radius:32px;
            background:
            rgba(255,255,255,.08);
            backdrop-filter:
            blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border:
            1px solid rgba(255,255,255,.18);
            box-shadow:
            0 10px 35px rgba(0,0,0,.35),
            inset 0 1px 1px rgba(255,255,255,.18),
            0 0 30px rgba(255,255,255,.08);
            color: #ffffff;
            box-sizing: border-box;
            overflow:hidden;
            position:relative;
            transition: all .35s ease;
        }

        .winner-card::before {
            content:"";
            position:absolute;
            top:0;
            left:-50%;
            width:60%;
            height:100%;
            background:
            linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,.12),
                transparent
            );
            transform:skewX(-25deg);
            pointer-events: none;
            z-index: 1;
        }

        .winner-card:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 15px 40px rgba(0,0,0,.45),
                inset 0 1px 1px rgba(255,255,255,.25),
                0 0 40px rgba(255,255,255,.12);
        }

        .winner-card:last-child {
            margin-bottom: 0;
        }

        .rank-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 800;
            color: #000000;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .rank-circle-1 {
            background: linear-gradient(135deg, #FFE082 0%, #FFB300 100%);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        
        .rank-circle-2 {
            background: linear-gradient(135deg, #F1F5F9 0%, #94A3B8 100%);
            box-shadow: 0 0 20px rgba(148, 163, 184, 0.4);
        }
        
        .rank-circle-3 {
            background: linear-gradient(135deg, #FFEDD5 0%, #D97706 100%);
            box-shadow: 0 0 20px rgba(217, 119, 6, 0.4);
        }

        .winner-card h3 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -0.01em;
            line-height: 1.2;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        }

        .winner-card p {
            margin: 4px 0 0 0;
            font-size: 16px;
            opacity: .8;
            color: #cbd5e1;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* Group Program Display Typography */
        .team-main{
            font-size:24px;
            font-weight:800;
            letter-spacing:1px;
            margin: 0;
            color:#ffffff;
            text-transform: uppercase;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        }

        .team-subtitle{
            font-size:16px;
            font-weight:700;
            color:#D4A017;
            opacity:.85;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ─────────────────────────────────────────────────────────────
           ELEGANT POSTER FOOTER BRANDING
           ───────────────────────────────────────────────────────────── */
        .poster-footer{
            position:absolute;
            bottom:18px;
            left:50%;
            transform:translateX(-50%);
            width:90%;
            text-align:center;
            font-size:clamp(
                12px,
                2vw,
                18px
            );
            font-weight:600;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }


        /* ─────────────────────────────────────────────────────────────
           BACKGROUND THUMBNAIL STRIP SWITCHER
           ───────────────────────────────────────────────────────────── */
        .thumbnail-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 5px 5px 5px;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
        }

        .thumb {
            width: 54px;
            height: 54px;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            border: 3px solid transparent;
            flex-shrink: 0;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .thumb:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .thumb.active {
            border-color: #6B4EFF;
            transform: scale(0.95);
            box-shadow: 0 0 0 3px rgba(107, 78, 255, 0.15);
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* ─────────────────────────────────────────────────────────────
           BALANCED ACTIONS BUTTONS ROW
           ───────────────────────────────────────────────────────────── */
        .poster-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }

        .poster-actions button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .poster-actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
        }

        .btn-action-primary {
            background: #6B4EFF;
            color: white;
        }

        .btn-action-primary:hover {
            background: #553cd6;
        }

        .btn-action-secondary {
            background: #e2e8f0;
            color: #0f172a;
        }

        .btn-action-secondary:hover {
            background: #cbd5e1;
        }


        /* ─────────────────────────────────────────────────────────────
           Toast Notification Styles
           ───────────────────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translate(-50%, 100px);
            background: #0f172a;
            color: white;
            padding: 0.85rem 1.75rem;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 2000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            box-sizing: border-box;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1.25rem;
            display: block;
            opacity: 0.7;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            margin: 0 0 0.5rem 0;
            font-weight: 800;
        }

        .empty-state p {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* ─────────────────────────────────────────────────────────────
           Isolated Printable Styles
           ───────────────────────────────────────────────────────────── */
        @media print {
            body {
                background: #ffffff !important;
                background-image: none !important;
            }
            .public-container {
                padding: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                width: 100% !important;
            }
            .public-header,
            .filter-bar,
            .thumbnail-list,
            .poster-actions,
            #loadingOverlay,
            .toast {
                display: none !important;
            }
            #resultsList {
                display: block !important;
            }
            .poster-container {
                page-break-after: always !important;
                break-after: page !important;
                margin-bottom: 0 !important;
                border: none !important;
                box-shadow: none !important;
            }
            .result-poster {
                border: 1px solid #000000 !important;
                box-shadow: none !important;
                background: #ffffff !important;
                color: #000000 !important;
                min-height: 0 !important;
                height: auto !important;
            }
            .result-poster .winner-card {
                background: #ffffff !important;
                color: #000000 !important;
                border: 1px solid #000000 !important;
                box-shadow: none !important;
            }
        }

        /* Responsive Layouts */
        @media(max-width:768px){
            .result-poster{
                width:95vw;
                max-width:420px;
                aspect-ratio:4/5;
            }
            .program{
                font-size:32px;
            }
            .result-number{
                font-size:18px;
            }
            .public-container {
                padding: 1rem;
                gap: 1.25rem;
            }
            .public-header {
                padding: 2rem 1rem;
            }
            .inst-name {
                font-size: 1.75rem;
            }
            .filter-bar {
                padding: 1rem;
                gap: 0.65rem;
            }
            .filter-select {
                flex: 1 1 100%;
            }
            .btn-search {
                flex: 1 1 100%;
            }
        }
        

    </style>
</head>
<body>
    <div class="public-container">
        <!-- Hero Header -->
        <div class="public-header" id="headerSection">
            <div class="header-glow"></div>
            <h1 class="inst-name" id="madrasaName">Results Portal</h1>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar" id="filterBar" style="display: none;">
            <select id="catFilter" class="filter-select">
                <option value="">Select Category</option>
            </select>
            <select id="progFilter" class="filter-select" disabled>
                <option value="">Select Program</option>
            </select>
            <button type="button" class="btn-search" id="btnFilterSearch">Search</button>
        </div>


        <!-- Results Grid -->
        <div id="resultsList"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast" class="toast"></div>

    <!-- Dynamic Overlay Loading -->
    <div id="loadingOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#f4f6f5;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s;">
        <div style="text-align:center;">
            <div class="header-logo" style="font-size:3.5rem;">🕌</div>
            <p style="color:#064e3b;font-size:1.1rem;font-weight:700;margin:0.5rem 0 0 0;">Verifying Credentials...</p>
            <p style="color:#64748b;font-size:0.8rem;font-weight:500;margin-top:0.25rem;">Loading Madrasa published results...</p>
        </div>
    </div>

    <script type="module" src="../js/public-results.js"></script>
</body>
</html>
