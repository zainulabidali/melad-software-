<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to Mark Entry...</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || '';
        const parts = token.split('_');
        const instId = urlParams.get('instituteId') || urlParams.get('id') || parts[0] || '';
        const judgeId = urlParams.get('judgeId') || parts[1] || '';
        window.location.href = './admin-dashboard.html?mode=standalone&instituteId=' + instId + 
            (judgeId ? '&judgeId=' + judgeId : '') + 
            (token ? '&token=' + token : '');
    </script>
</head>
<body>
    <p>Redirecting to Mark Entry...</p>
</body>
</html>
